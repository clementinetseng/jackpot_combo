<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Semantic + Status</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--ink)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
  .sw{border-radius:10px;padding:12px;min-height:88px;display:flex;flex-direction:column;justify-content:space-between}
  .n{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .h{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600}
  .label{font-size:11px;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
</style></head>
<body>
  <div class="label">Semantic</div>
  <div class="row">
    <div class="sw" style="background:#D1FAE5;color:#065F46"><span class="n">Success</span><span class="h">#10B981</span></div>
    <div class="sw" style="background:#FEF3C7;color:#92400E"><span class="n">Warning</span><span class="h">#F59E0B</span></div>
    <div class="sw" style="background:#FEE2E2;color:#991B1B"><span class="n">Danger</span><span class="h">#EF4444</span></div>
    <div class="sw" style="background:#F3EEFF;color:#6D28D9"><span class="n">Info</span><span class="h">#7C3AED</span></div>
    <div class="sw" style="background:#EFF3FF;color:#1E40AF"><span class="n">Office Info</span><span class="h">#2563EB</span></div>
  </div>
  <div class="label">Reward status — 4px left-border accent</div>
  <div class="row" style="grid-template-columns:repeat(5,1fr)">
    <div class="sw" style="background:#fff;border-left:4px solid #8E66FF;box-shadow:var(--shadow-card)"><span class="badge" style="background:rgba(142,102,255,.15);color:#8E66FF">Active</span><span class="h" style="color:#8E66FF">#8E66FF</span></div>
    <div class="sw" style="background:#fff;border-left:4px solid #6B5B8E;box-shadow:var(--shadow-card)"><span class="badge" style="background:#E8E0F5;color:#6B5B8E">Pending</span><span class="h" style="color:#6B5B8E">#6B5B8E</span></div>
    <div class="sw" style="background:#fff;border-left:4px solid #10B981;box-shadow:var(--shadow-card)"><span class="badge" style="background:#D1FAE5;color:#047857">Completed 🎉</span><span class="h" style="color:#047857">#10B981</span></div>
    <div class="sw" style="background:#fff;border-left:4px solid #F59E0B;box-shadow:var(--shadow-card)"><span class="badge" style="background:#FEF3C7;color:#92400E">Ended (low balance)</span><span class="h" style="color:#92400E">#F59E0B</span></div>
    <div class="sw" style="background:#fff;border-left:4px solid #F97316;box-shadow:var(--shadow-card)"><span class="badge" style="background:#FED7AA;color:#9A3412">Cancelled</span><span class="h" style="color:#9A3412">#F97316</span></div>
  </div>
</body></html>
