<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons · player</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--ink)}
  .row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:9999px;font-weight:600;font-size:14px;font-family:inherit;border:0;cursor:pointer;transition:all .15s}
  .btn-primary{background:var(--player-gradient-cta);color:#fff}
  .btn-primary:hover{box-shadow:var(--shadow-pill)}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--ink-muted)}
  .btn-outline:hover{border-color:var(--player-primary);color:var(--player-primary)}
  .btn-ghost{background:rgba(255,255,255,.6);color:var(--ink-muted)}
  .btn-yellow{background:#FFC107;color:var(--ink);font-weight:700}
  .btn-disabled{background:linear-gradient(90deg,#d1d5db,#9ca3af);color:#fff;cursor:not-allowed}
  .sm{padding:6px 12px;font-size:12px;font-weight:500}
  .lg{padding:14px 24px;font-size:16px;font-weight:700}
  .label{font-size:10px;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
</style></head>
<body>
  <div class="label">Variants</div>
  <div class="row">
    <button class="btn btn-primary">Claim Now</button>
    <button class="btn btn-outline">View T&amp;C</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-yellow">Deposit</button>
    <button class="btn btn-disabled">🔒 Locked — Complete requirements</button>
  </div>
  <div class="label">Sizes</div>
  <div class="row">
    <button class="btn btn-primary sm">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary lg">Play Now →</button>
  </div>
</body></html>
