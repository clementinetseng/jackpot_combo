<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type · display + headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px dashed var(--border)}
  .row:last-child{border:0}
  .meta{width:130px;font-size:11px;color:var(--ink-muted);font-family:var(--font-sans);font-weight:600;letter-spacing:.03em;text-transform:uppercase}
</style></head>
<body>
  <div class="row"><span class="meta">Display · 30/800</span><span class="display amount">₱6,882.43</span></div>
  <div class="row"><span class="meta">h1 · 24/700</span><h1 style="margin:0">Reward Center</h1></div>
  <div class="row"><span class="meta">h2 · 18/700</span><h2 style="margin:0">Active Promotion</h2></div>
  <div class="row"><span class="meta">h3 · 16/600</span><h3 style="margin:0">Bonus Turnover</h3></div>
  <div class="row"><span class="meta">body · 14/400</span><p style="margin:0">Bet ₱45,000 more to withdraw your bonus earnings.</p></div>
  <div class="row"><span class="meta">caption · 11/400</span><span class="caption">Apr 14, 2026 · 10:22:15 · UTC+8</span></div>
</body></html>
