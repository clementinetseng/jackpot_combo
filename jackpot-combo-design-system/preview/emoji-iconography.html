<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Emoji iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .g{text-align:center;border:1px solid var(--border);border-radius:10px;padding:10px 6px}
  .e{font-size:24px;line-height:1}
  .n{font-size:10px;color:var(--ink-muted);font-weight:500;margin-top:4px}
  .label{font-size:11px;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.05em;margin:6px 0}
</style></head>
<body>
  <div class="label">Sanctioned emoji bucket — player surface only</div>
  <div class="grid">
    <div class="g"><div class="e">🎁</div><div class="n">Rewards</div></div>
    <div class="g"><div class="e">🎰</div><div class="n">Slots / Active</div></div>
    <div class="g"><div class="e">💰</div><div class="n">Deposit Turnover</div></div>
    <div class="g"><div class="e">💳</div><div class="n">Deposit</div></div>
    <div class="g"><div class="e">💸</div><div class="n">Withdraw</div></div>
    <div class="g"><div class="e">🎉</div><div class="n">Completed</div></div>
    <div class="g"><div class="e">✅</div><div class="n">Ready</div></div>
    <div class="g"><div class="e">🔒</div><div class="n">Locked</div></div>
    <div class="g"><div class="e">🎧</div><div class="n">Support</div></div>
    <div class="g"><div class="e">📋</div><div class="n">Records</div></div>
    <div class="g"><div class="e">🏠</div><div class="n">Casino / Home</div></div>
    <div class="g"><div class="e">⭐</div><div class="n">About / Featured</div></div>
    <div class="g"><div class="e">👁️</div><div class="n">Show balance</div></div>
    <div class="g"><div class="e">↻</div><div class="n">Refresh</div></div>
    <div class="g"><div class="e">🏢</div><div class="n">Provider</div></div>
    <div class="g"><div class="e">ℹ️</div><div class="n">Info toast</div></div>
  </div>
</body></html>
