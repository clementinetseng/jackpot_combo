<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type · scale + weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--ink)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-muted);font-weight:700}
  .demo{font-variant-numeric:tabular-nums}
</style></head>
<body>
  <table>
    <thead><tr><th>Token</th><th>px</th><th>Specimen</th></tr></thead>
    <tbody>
      <tr><td>2xs</td><td>10</td><td class="demo" style="font-size:10px">The quick brown fox jumps over</td></tr>
      <tr><td>xs</td><td>11</td><td class="demo" style="font-size:11px">The quick brown fox jumps over</td></tr>
      <tr><td>sm</td><td>12</td><td class="demo" style="font-size:12px">The quick brown fox jumps over</td></tr>
      <tr><td>base</td><td>14</td><td class="demo" style="font-size:14px">The quick brown fox jumps over</td></tr>
      <tr><td>md</td><td>16</td><td class="demo" style="font-size:16px">The quick brown fox jumps</td></tr>
      <tr><td>lg</td><td>18</td><td class="demo" style="font-size:18px">The quick brown fox</td></tr>
      <tr><td>xl</td><td>20</td><td class="demo" style="font-size:20px">Quick brown fox</td></tr>
      <tr><td>2xl</td><td>24</td><td class="demo" style="font-size:24px;font-weight:700">Quick brown fox</td></tr>
      <tr><td>3xl</td><td>30</td><td class="demo" style="font-size:30px;font-weight:800;color:#FFC107;background:#2D1B4E;padding:2px 10px;border-radius:6px;display:inline-block">₱6,882.43</td></tr>
    </tbody>
  </table>
</body></html>
