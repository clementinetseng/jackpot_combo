<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Wallet banner</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--player-gradient-page);font-family:var(--font-sans);color:var(--ink)}
  .banner{background:var(--player-gradient-banner);border-radius:20px;padding:24px;box-shadow:var(--shadow-card);color:#fff;display:flex;justify-content:space-between;align-items:center;gap:16px}
  .lbl{font-size:11px;opacity:.85}
  .bal{font-size:30px;font-weight:800;color:#FFC107;display:flex;align-items:center;gap:8px}
  .wd{font-size:11px;opacity:.85;margin-top:4px}
  .pill{background:rgba(255,255,255,.2);padding:10px 18px;border-radius:9999px;backdrop-filter:blur(8px);font-size:13px;font-weight:600}
  .refresh{background:none;border:0;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer}
</style></head>
<body>
  <div class="banner">
    <div>
      <div class="lbl">Total Balance</div>
      <div class="bal amount">₱6,882.43 <button class="refresh">↻</button></div>
      <div class="wd">Withdrawable: <strong>₱6,882.43</strong></div>
    </div>
    <div class="pill">📋 Record Center →</div>
  </div>
</body></html>
