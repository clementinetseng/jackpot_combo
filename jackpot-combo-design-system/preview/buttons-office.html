<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons · office</title>
<link rel="stylesheet" href="../colors_and_type.css">
</head>
<body data-theme="office" style="margin:0;padding:20px;background:#fff;font-family:var(--font-office);color:var(--office-text)">
<style>
  .row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-weight:500;font-size:13px;font-family:inherit;border:1px solid transparent;cursor:pointer;transition:all .15s}
  .btn-primary{background:#2563EB;color:#fff}
  .btn-primary:hover{background:#1D4ED8}
  .btn-outline{background:#fff;border-color:#DFE2E8;color:#6B7280}
  .btn-outline:hover{border-color:#c0c4cc;color:#1A1D26}
  .btn-danger{background:#DC2626;color:#fff}
  .btn-outline-danger{background:#fff;border-color:#DC2626;color:#DC2626}
  .btn-sm{padding:4px 12px;font-size:12px}
  .btn-lg{padding:12px 20px;font-size:14px}
  .label{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
</style>
  <div class="label">Variants</div>
  <div class="row">
    <button class="btn btn-primary">+ Create Promotion</button>
    <button class="btn btn-outline">Cancel</button>
    <button class="btn btn-danger">Cancel Rewards</button>
    <button class="btn btn-outline-danger">Disable</button>
  </div>
  <div class="label">Sizes</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">View</button>
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-primary btn-lg">Publish</button>
  </div>
</body></html>
