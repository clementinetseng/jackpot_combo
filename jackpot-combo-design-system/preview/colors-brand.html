<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-sans);color:var(--ink)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border-radius:10px;padding:12px;color:#fff;min-height:88px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-card)}
  .sw .n{font-size:11px;font-weight:600;opacity:.9;letter-spacing:.02em;text-transform:uppercase}
  .sw .h{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .sw.gr{grid-column:span 2;min-height:88px}
</style></head>
<body>
  <div class="row">
    <div class="sw gr" style="background:var(--player-gradient-pill)"><span class="n">Gradient Pill · primary CTA</span><span class="h">#8E66FF → #B185FF</span></div>
    <div class="sw gr" style="background:var(--player-gradient-banner)"><span class="n">Banner · wallet / hero</span><span class="h">#6FB1FC → #8E66FF → #B185FF</span></div>
    <div class="sw" style="background:#8E66FF"><span class="n">Primary</span><span class="h">#8E66FF</span></div>
    <div class="sw" style="background:#B185FF"><span class="n">Primary Light</span><span class="h">#B185FF</span></div>
    <div class="sw" style="background:#6FB1FC"><span class="n">Secondary</span><span class="h">#6FB1FC</span></div>
    <div class="sw" style="background:#5B46A6"><span class="n">Deep</span><span class="h">#5B46A6</span></div>
    <div class="sw" style="background:#FFC107;color:#2D1B4E"><span class="n">Accent · Balance</span><span class="h">#FFC107</span></div>
    <div class="sw" style="background:#2563EB"><span class="n">Office Primary</span><span class="h">#2563EB</span></div>
    <div class="sw" style="background:#1E2433"><span class="n">Office Sidebar</span><span class="h">#1E2433</span></div>
    <div class="sw" style="background:var(--player-gradient-page);color:#2D1B4E"><span class="n">Page (Player)</span><span class="h">#EBE3F7 → #BFA8E1</span></div>
  </div>
</body></html>
