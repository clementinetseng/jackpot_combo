<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Promotion card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--player-gradient-page);font-family:var(--font-sans);color:var(--ink)}
  .card{background:#fff;border-radius:14px;box-shadow:var(--shadow-card);overflow:hidden}
  .hd{background:var(--player-gradient-banner);padding:14px 16px;color:#fff;display:flex;gap:12px;align-items:center}
  .icon{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:22px}
  .tag{font-size:10px;font-weight:700;letter-spacing:.08em;opacity:.85}
  .ttl{font-size:15px;font-weight:700;margin-top:2px}
  .sub{font-size:11px;opacity:.85;margin-top:2px}
  .bd{padding:14px 16px}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-muted);margin-bottom:10px}
  .row{display:flex;gap:8px}
  .btn{flex:1;padding:10px;border-radius:9999px;font-weight:600;font-size:13px;border:0;cursor:pointer;font-family:inherit}
  .pri{background:var(--player-gradient-cta);color:#fff}
  .out{background:#fff;border:1px solid var(--border);color:var(--ink-muted)}
</style></head>
<body>
  <div class="card">
    <div class="hd">
      <div class="icon">🎁</div>
      <div>
        <div class="tag">FIRST DEPOSIT</div>
        <div class="ttl">100% First Deposit Bonus</div>
        <div class="sub">Up to ₱5,000 · Bet ₱45,000 to withdraw</div>
      </div>
    </div>
    <div class="bd">
      <div class="meta"><span>Apr 10 ~ Apr 30</span><span>Min ₱500</span></div>
      <div class="row">
        <button class="btn out">View T&amp;C</button>
        <button class="btn pri">Claim Now</button>
      </div>
    </div>
  </div>
</body></html>
