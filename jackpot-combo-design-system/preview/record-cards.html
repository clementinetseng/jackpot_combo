<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Record cards · status accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:var(--player-gradient-page);font-family:var(--font-sans);color:var(--ink)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow-card);border-left:4px solid var(--border)}
  .card.act{border-left-color:#8E66FF}
  .card.cmp{border-left-color:#10B981}
  .card.end{border-left-color:#F59E0B}
  .card.cnc{border-left-color:#F97316}
  .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .ttl{font-weight:700;font-size:13px}
  .b{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:10px;font-weight:600}
  .act .b{background:rgba(142,102,255,.15);color:#8E66FF}
  .cmp .b{background:#D1FAE5;color:#047857}
  .end .b{background:#FEF3C7;color:#92400E}
  .cnc .b{background:#FED7AA;color:#9A3412}
  .meta{font-size:10px;color:var(--ink-muted);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="grid">
    <div class="card act"><div class="hd"><span class="ttl">🎁 100% First Deposit Bonus</span><span class="b">Active</span></div><div class="meta">Joined 2026/04/14 · ₱31,800 / ₱45,000</div></div>
    <div class="card cmp"><div class="hd"><span class="ttl">💰 50% Reload Bonus</span><span class="b">Completed 🎉</span></div><div class="meta">Joined 2026/03/22 · ₱30,000 / ₱30,000</div></div>
    <div class="card end"><div class="hd"><span class="ttl">🎰 ₱200 Slots Cashback</span><span class="b">Ended (low balance)</span></div><div class="meta">Joined 2026/03/10 · ₱2,200 / ₱4,000</div></div>
    <div class="card cnc"><div class="hd"><span class="ttl">🎁 Daily Bonus</span><span class="b">Cancelled</span></div><div class="meta">Joined 2026/02/28 · ₱8,500 / ₱12,000</div></div>
  </div>
</body></html>
